name: Collect rTASSEL GitHub Insights

on:
  schedule:
    - cron: "0 11 * * *" # 6 AM CDT (summer)
    - cron: "0 12 * * *" # 6 AM CST (winter)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-time:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.timecheck.outputs.should_run }}
    steps:
      - name: Check if 6 AM Central
        id: timecheck
        run: |
          HOUR=$(TZ='America/Chicago' date +%H)
          echo "should_run=$( [ "$HOUR" = "06" ] && echo 'true' || echo 'false' )" >> "$GITHUB_OUTPUT"

  collect-and-deploy:
    needs: check-time
    if: needs.check-time.outputs.should-run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Collect all data
        run: pixi run collect-all
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit and push data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update rTASSEL insights [automated]"
          file_pattern: "data/*.json"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
